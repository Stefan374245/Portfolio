name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app (production)
        run: npm run build

      - name: Deploy via FTP to Hostinger
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set ssl:verify-certificate no
            set ftp:ssl-allow yes
            open -u \"$FTP_USERNAME\" -p 21 \"$FTP_SERVER\"
            user \"$FTP_USERNAME\" \"$FTP_PASSWORD\"
            mirror --reverse --verbose ./dist/portfolio/browser/ domains/stefan-helldobler.de/public_html/
          "
